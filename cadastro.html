<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section id="cadastro-section" class="full-section section-dark">
    <div class="form-box">
        <h2 class="titulo-verde">Crie sua conta</h2>

        <div class="input-group">
            <label>Nome Completo</label>
            <input type="text" placeholder="Nome Sobrenome">
        </div>

        <div class="input-group">
            <label>E-mail</label>
            <input type="email" placeholder="exemplo@email.com">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="input-group">
            <label>CEP</label>
            <input type="text" placeholder="00000-000" maxlength="9">
        </div>

        <div class="input-group">
            <label>Endereço</label>
            <input type="text" placeholder="Rua e número da casa">
        </div>

        <a href="#hero-section" class="btn-neon btn-large">CADASTRAR</a>

        <div class="switch-link">
            <p>Já é membro? <a href="#login-section">Fazer Login</a></p>
        </div>
    </div>
</section>
    <body>
        <script src="script.js"></script>
</html>
