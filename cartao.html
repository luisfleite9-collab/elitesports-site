<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section id="cartao-section" class="full-section section-dark">
        <div class="form-box">
            <h2 class="titulo-verde">Dados do Cartão</h2>

            <div class="input-group">
                <label>Número do Cartão</label>
                <input type="text" placeholder="0000 0000 0000 0000">
            </div>

            <div class="input-group">
                <label>Nome Impresso</label>
                <input type="text" placeholder="NOME COMO NO CARTÃO">
            </div>

            <div class="linha-dupla">
                <div class="input-group flex-2">
                    <label>Validade</label>
                    <input type="text" placeholder="MM/AA">
                </div>

                <div class="input-group flex-1">
                    <label>CVV</label>
                    <input type="text" placeholder="123">
                </div>
            </div>

            <div class="input-group">
                <label>Parcelas</label>
                <select>
                    <option>1x de R$ 299,99 sem juros</option>
                    <option>2x de R$ 149,99 sem juros</option>
                    <option>3x de R$ 99,99 sem juros</option>
                </select>
            </div>

            <a href="confirmaçao.html"class="btn-neon btn-large">
                CONFIRMAR PAGAMENTO
            </a>
        </div>
    </section>
    <script src="script.js"></script>
</body>

</html>
